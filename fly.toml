# fly.toml app configuration file generated for metro-lisboa-ar on 2026-07-15T23:09:52Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'metro-lisboa-ar'
primary_region = 'cdg'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[checks]
  [checks.health]
    port = 8000
    type = 'http'
    interval = '30s'
    timeout = '5s'
    grace_period = '20s'
    method = 'get'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'

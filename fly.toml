# Fly.io config for the Metro Lisboa interpolation backend.
# `fly launch` will confirm/adjust the app name (must be globally unique).
app = "metro-lisboa-live"
primary_region = "mad"   # Madrid — Fly's closest region to Lisbon

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  # The service runs a continuous poller + long-lived SSE streams, so keep one
  # machine always on (do NOT scale to zero).
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[checks.health]
  type = "http"
  port = 8000
  method = "get"
  path = "/health"
  interval = "30s"
  timeout = "5s"
  grace_period = "20s"

name: metro_lisboa_ar
description: Live Lisbon Metro trains — 2D map now, AR later.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  http: ^1.2.0
  geolocator: ^13.0.1
  google_fonts: ^6.2.1
  shared_preferences: ^2.2.2
  flutter_svg: ^2.0.10   # the official line pictograms ship as SVG

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/logos/

# App icon:  dart run flutter_launcher_icons
# Regenerates ios/Runner/Assets.xcassets/AppIcon.appiconset (all sizes).
# app_icon.png is a square mark: the logo's four line-colour speed-lines on
# charcoal (generated, staggered so it reads as motion, not a menu icon).
flutter_launcher_icons:
  ios: true
  android: false
  image_path: "assets/logos/app_icon.png"
  remove_alpha_ios: true
  background_color_ios: "#262626"
